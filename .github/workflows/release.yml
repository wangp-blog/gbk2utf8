name: Windows Auto Release

on:
  push:
    branches:
      - main  # 或者是 master，只要推送到这个分支就触发
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate Version (Timestamp)
      id: vars
      shell: bash
      run: |
        # 生成时间戳作为唯一的 Tag
        echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

    - name: Build with PyInstaller
      run: pyinstaller --name gbk2utf8-windows --onefile --windowed main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        # 使用上面生成的带时间的 tag
        tag_name: ${{ steps.vars.outputs.tag }}
        name: Release ${{ steps.vars.outputs.tag }}
        body: |
          自动生成的 Windows 构建版本。
          本次提交内容: ${{ github.event.head_commit.message }}
        files: dist/gbk2utf8-windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
