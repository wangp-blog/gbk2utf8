name: Windows Auto Release

on:
  push:
    tags:
      - 'v*' # 只有当你手动打以 v 开头的标签推送到 GitHub 时才触发

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate Version (Timestamp)
      id: vars
      shell: bash
      run: |
        # 生成格式如 2023.10.27.143055 的时间戳
        echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

    - name: Build with PyInstaller
      run: pyinstaller --name gbk2utf8-windows --onefile --windowed main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.vars.outputs.tag }}
        name: Release ${{ steps.vars.outputs.tag }}
        body: |
          自动生成的 Windows 构建版本。
          提交信息: ${{ github.event.head_commit.message }}
        files: dist/gbk2utf8-windows.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
